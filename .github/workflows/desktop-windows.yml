name: Build Desktop Windows Installer

on:
  workflow_dispatch:
    inputs:
      create_release:
        description: "Create a GitHub Release and attach installer"
        required: false
        default: "true"
      tag_name:
        description: "Optional release tag (example: v1.0.0). If empty, auto-generated."
        required: false
        default: ""
  push:
    branches:
      - main
    paths:
      - "desktop/**"
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "next.config.mjs"
      - ".github/workflows/desktop-windows.yml"

jobs:
  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Build Next.js app
        run: npm run build

      - name: Build Windows installer
        run: npm run desktop:dist:win

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ari-desktop-windows-installer
          path: dist-desktop/*.exe
          if-no-files-found: error

      - name: Resolve release tag
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == 'true'
        id: release_tag
        shell: pwsh
        run: |
          $inputTag = "${{ inputs.tag_name }}".Trim()
          if ([string]::IsNullOrWhiteSpace($inputTag)) {
            $inputTag = "desktop-" + (Get-Date -Format "yyyyMMdd-HHmmss")
          }
          "tag=$inputTag" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Create GitHub release and upload installer
        if: github.event_name == 'workflow_dispatch' && inputs.create_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.release_tag.outputs.tag }}
          name: Ari Desktop ${{ steps.release_tag.outputs.tag }}
          generate_release_notes: true
          files: dist-desktop/*.exe
